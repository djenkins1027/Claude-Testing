<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Documents{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    a { color: #0b5fff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { margin-bottom: 1.5rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
    textarea { width: 100%; font-family: monospace; font-size: 0.9rem; }
    .actions { margin-top: 1rem; }
    .note { background: #fff8e1; border: 1px solid #f0d878; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; }
    input[type=text], select { padding: 0.4rem; width: 100%; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <nav><a href="{{ url_for('index') }}">Documents Home</a></nav>
  {% block content %}{% endblock %}
</body>
</html>
